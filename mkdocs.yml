site_name: Forge
site_description: Self-improving agent harness SDK
repo_url: https://github.com/jalajagrawalgenai/HarnessForge
theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: amber
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Dashboard: dashboard.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
  - Concepts:
      - 4-Layer Architecture: concepts/architecture.md
      - Self-Improvement: concepts/self-improvement.md
  - CLI Reference: cli.md

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
